<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- shadow -->
  <ellipse cx="100" cy="225" rx="50" ry="6" fill="#1f2937" opacity="0.25"/>
  <!-- legs -->
  <rect x="78" y="160" width="18" height="60" rx="6" fill="#1f2937"/>
  <rect x="104" y="160" width="18" height="60" rx="6" fill="#1f2937"/>
  <!-- body / apron -->
  <path d="M60 90 Q100 80 140 90 L150 170 Q100 180 50 170 Z" fill="#dc2626"/>
  <!-- white apron -->
  <path d="M76 100 L124 100 L130 168 Q100 175 70 168 Z" fill="#fef9c3" stroke="#fbbf24" stroke-width="2"/>
  <!-- arms -->
  <ellipse cx="50" cy="120" rx="14" ry="32" fill="#dc2626"/>
  <ellipse cx="150" cy="120" rx="14" ry="32" fill="#dc2626"/>
  <!-- hands holding tray -->
  <circle cx="50" cy="148" r="9" fill="#fcd5b1"/>
  <circle cx="150" cy="148" r="9" fill="#fcd5b1"/>
  <rect x="40" y="138" width="120" height="6" rx="2" fill="#92400e"/>
  <!-- bowl on tray -->
  <ellipse cx="100" cy="138" rx="22" ry="6" fill="#fef9c3" stroke="#92400e" stroke-width="2"/>
  <path d="M78 138 Q100 145 122 138 L118 130 L82 130 Z" fill="#fef9c3" stroke="#92400e" stroke-width="2"/>
  <!-- head -->
  <circle cx="100" cy="60" r="32" fill="#fcd5b1"/>
  <!-- hair -->
  <path d="M68 50 Q100 20 132 50 L132 35 Q100 10 68 35 Z" fill="#1f2937"/>
  <!-- eyes -->
  <circle cx="88" cy="60" r="3" fill="#1f2937"/>
  <circle cx="112" cy="60" r="3" fill="#1f2937"/>
  <!-- smile -->
  <path d="M86 75 Q100 85 114 75" stroke="#1f2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle cx="80" cy="72" r="3" fill="#fb7185" opacity="0.6"/>
  <circle cx="120" cy="72" r="3" fill="#fb7185" opacity="0.6"/>
</svg>
